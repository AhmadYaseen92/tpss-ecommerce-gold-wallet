version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: tpss_goldwallet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gold_wallet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - goldwallet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gold_wallet"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  goldwallet_pgdata:
